{% extends 'base.html' %}

{% block content %}

<div class="card shadow-lg border-0 rounded-4">

    {% if post.image %}
    <img src="{{ post.image.url }}" class="img-fluid rounded-top">
    {% endif %}

    <div class="card-body p-5">
        <h1>{{ post.title }}</h1>

        <p class="text-muted">
            By {{ post.author }} | {{ post.created_at }}
        </p>

        <hr>

        <p>{{ post.content }}</p>
    </div>
</div>

{% endblock %}
