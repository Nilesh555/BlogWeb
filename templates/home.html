{% extends 'base.html' %}

{% block content %}

<div class="hero">
    <h1>Modern Django Blog</h1>
    <p>Create amazing blog posts with beautiful UI.</p>
</div>

<div class="row">
    {% for post in posts %}
    <div class="col-md-4 mb-4">
        <div class="card post-card">

            {% if post.image %}
            <img src="{{ post.image.url }}" class="card-img-top" height="250">
            {% endif %}

            <div class="card-body">
                <h4>{{ post.title }}</h4>

                <p>
                    {{ post.content|truncatewords:20 }}
                </p>

                <a href="{% url 'post_detail' post.pk %}" class="btn btn-main">
                    Read More
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
