{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="card shadow-lg border-0 rounded-4 p-4">
            <h2>Create New Post</h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-main">
                    Publish
                </button>
            </form>
        </div>

    </div>
</div>

{% endblock %}
