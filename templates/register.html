{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow-lg border-0 rounded-4 p-4">
            <h2 class="mb-4 text-center">Register</h2>

            <form method="POST">
                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-main w-100">
                    Register
                </button>
            </form>
        </div>

    </div>
</div>

{% endblock %}
